<style>
:root{
  --bg:#1e1f22;--surface:#2b2d31;--elevated:#313338;
  --blurple:#5865F2;--green:#23a55a;--red:#f23f42;--pink:#eb459e;
  --text:#dbdee1;--muted:#80848e;
}

#ch13-root{box-sizing:border-box;margin:0;padding:0;width:100%;height:100%;position:absolute;inset:0}
#ch13-root *{box-sizing:border-box;margin:0;padding:0}

#bg{position:fixed;inset:0;background:radial-gradient(ellipse at 15% 50%,rgba(88,101,242,.12) 0%,transparent 60%),radial-gradient(ellipse at 85% 20%,rgba(87,242,135,.07) 0%,transparent 50%),radial-gradient(ellipse at 60% 85%,rgba(235,69,158,.07) 0%,transparent 50%),#1e1f22;transition:filter 1.5s;z-index:0}
#bg.dramatic{filter:brightness(0.15)}

#discord-ui{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1;transition:opacity 1.5s}
#discord-ui.fading{opacity:.08}

#topbar{height:44px;background:rgba(30,31,34,.96);border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;padding:0 16px;gap:10px;backdrop-filter:blur(12px);flex-shrink:0}
.ch-icon{width:18px;height:18px;fill:var(--muted)}
.ch-name{font-size:14px;font-weight:800;color:var(--text)}
.live-pill{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(35,165,90,.14);border:1px solid rgba(35,165,90,.3);border-radius:4px;padding:3px 10px;font-size:11px;font-weight:700;color:var(--green);letter-spacing:.5px}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

#call-area{flex:1;display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap;padding:24px}

.avatar-card{display:flex;flex-direction:column;align-items:center;gap:10px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
@keyframes popOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.5)}}

.avatar-ring{width:114px;height:114px;border-radius:50%;border:3px solid rgba(255,255,255,.1);padding:3px;transition:border-color .25s,box-shadow .25s;position:relative}
.avatar-ring.speaking{border-color:var(--green);box-shadow:0 0 0 3px rgba(35,165,90,.22),0 0 24px rgba(35,165,90,.15)}
.avatar-inner{width:100%;height:100%;border-radius:50%;overflow:hidden}

.nametag{font-size:12px;font-weight:800;letter-spacing:.3px;background:rgba(0,0,0,.55);padding:3px 10px;border-radius:4px;backdrop-filter:blur(6px);transition:all .3s;text-align:center;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@keyframes nameFlash{0%{transform:scale(1);opacity:1}40%{transform:scale(1.25);opacity:.6}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
.name-flash{animation:nameFlash .5s ease forwards}

.drawing-badge{position:absolute;bottom:1px;right:1px;width:26px;height:26px;background:#2b2d31;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid var(--surface);animation:wiggle 3s infinite ease-in-out}
@keyframes wiggle{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}

#controls{height:60px;background:rgba(22,23,26,.98);border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;gap:10px;flex-shrink:0;backdrop-filter:blur(12px)}
.cbtn{width:42px;height:42px;border-radius:50%;border:none;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;cursor:default}
.cbtn.danger{background:var(--red)}
.cbtn svg{width:19px;height:19px;fill:var(--text)}

#ss-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;opacity:0;pointer-events:none;transition:opacity .4s}
#ss-overlay.active{opacity:1;pointer-events:all}
.ss-window{width:min(580px,90vw);background:#0d0d18;border-radius:10px;border:1px solid rgba(88,101,242,.35);overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.7)}
.ss-bar{height:30px;background:#08080f;display:flex;align-items:center;padding:0 12px;gap:7px;font-size:11px;color:var(--muted)}
.ss-dot{width:10px;height:10px;border-radius:50%}
.ss-live{margin-left:auto;color:var(--red);font-size:10px;font-weight:800;letter-spacing:1px;animation:blink .9s infinite}

#dark-veil{position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity 1.5s;z-index:40}
#dark-veil.active{opacity:.92}

#dialog{position:fixed;bottom:0;left:0;right:0;z-index:60;display:flex;justify-content:center;padding:0 20px 20px;transform:translateY(110%);transition:transform .4s cubic-bezier(.34,1.45,.64,1)}
#dialog.up{transform:translateY(0)}
.dialog-inner{width:100%;max-width:780px;background:rgba(20,21,24,.96);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px 20px 14px;backdrop-filter:blur(24px);box-shadow:0 -6px 50px rgba(0,0,0,.5);position:relative}
#d-name{font-size:13px;font-weight:900;margin-bottom:6px;letter-spacing:.3px}
#d-text{font-size:15px;font-weight:500;color:#e0e3e7;line-height:1.6;min-height:22px}
.d-hint{position:absolute;bottom:14px;right:16px;font-size:10px;color:var(--muted);letter-spacing:.5px;animation:hint 1.6s infinite}
@keyframes hint{0%,100%{opacity:.3}50%{opacity:.9}}

#dramatic-dialog{position:fixed;inset:0;z-index:70;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .6s}
#dramatic-dialog.active{opacity:1;pointer-events:all}
#dd-name{font-size:11px;font-weight:900;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}
#dd-text{font-size:24px;font-weight:700;text-align:center;color:#fff;text-shadow:0 0 40px rgba(255,255,255,.25);max-width:520px;line-height:1.5}
.dd-hint{margin-top:32px;font-size:11px;color:rgba(255,255,255,.2);letter-spacing:1px;animation:hint 1.6s infinite}
.mystery-text{text-shadow:0 0 30px rgba(139,0,0,.8),0 0 60px rgba(139,0,0,.4) !important}

#toast{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-12px);background:rgba(30,31,34,.96);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:9px 16px;font-size:12px;font-weight:700;backdrop-filter:blur(10px);z-index:80;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

#transition{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:90;opacity:0;pointer-events:none;transition:opacity .5s}
#transition.active{opacity:1}
.tr-text{font-size:18px;font-weight:600;color:var(--muted);letter-spacing:3px}

#start{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:200;transition:opacity .5s;backdrop-filter:blur(4px)}
#start.hidden{opacity:0;pointer-events:none}
.start-chapter{font-size:11px;font-weight:700;letter-spacing:4px;color:var(--muted);text-transform:uppercase}
.start-title{font-size:32px;font-weight:900;color:#fff;letter-spacing:1px}
.start-sub{font-size:14px;color:var(--muted);margin-top:4px}
.start-btn{margin-top:20px;padding:12px 32px;background:var(--blurple);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.5px;transition:background .2s, transform .1s}
.start-btn:hover{background:#4752c4}
.start-btn:active{transform:scale(.97)}

#end-card{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;opacity:0;pointer-events:none;transition:opacity 1.2s}
#end-card.active{opacity:1;pointer-events:all}
.end-main{font-size:26px;font-weight:900;color:#fff;letter-spacing:5px;text-transform:uppercase}
.end-sub{font-size:14px;color:rgba(255,255,255,.45);margin-top:12px;letter-spacing:2px}
.end-back-btn{margin-top:40px;padding:11px 30px;background:transparent;border:1px solid rgba(255,255,255,.2);border-radius:8px;color:rgba(255,255,255,.5);font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;font-family:inherit;transition:all .25s;text-transform:uppercase}
.end-back-btn:hover{border-color:rgba(255,255,255,.55);color:#fff;background:rgba(255,255,255,.05)}
.end-back-btn:active{transform:scale(.97)}
</style>

      window.endingAloneBack();

      setTimeout(function(){
